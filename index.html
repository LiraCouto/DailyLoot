<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAILY LOOT</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="login-screen" class="login-container">
      <div class="card login-card">
        <h1>DAILY<span>LOOT</span></h1>
        <p>Sua jornada de evolução começa aqui.</p>
        <input type="text" id="username" placeholder="Seu Nome" />
        <button onclick="handleLogin()">Entrar</button>
      </div>
    </div>

    <div id="app-container" style="display: none">
      <header class="menu">
        <div class="menu-content">
          <h1>DAILY<span>LOOT</span></h1>
          <div class="stats-header">
            <span id="display-user"></span>
            <button onclick="handleLogout()" class="logout-btn">Sair</button>
          </div>
        </div>
      </header>

      <main class="main-content">
        <div class="top-stats">
          <span>⭐ Nível: <span id="level-value">1</span></span>
          <span>🏆 Pontos: <span id="points-value">0</span></span>
          <span>🔥 Dias Treino: <span id="days-trained">0</span></span>
        </div>

        <section class="progress-section card">
          <h2>Progresso do Dia</h2>
          <div class="progress-bar-container">
            <div class="progress-bar" id="main-progress"></div>
          </div>
        </section>

        <div class="grid-categories">
          <section class="category-card">
            <h3>🍎 Físico</h3>
            <div id="desc-physical" class="challenge-text"></div>
            <button onclick="completeChallenge('physical')" id="btn-physical">
              Concluir
            </button>
          </section>
          <section class="category-card">
            <h3>🙏 Espiritual</h3>
            <div id="desc-spiritual" class="challenge-text"></div>
            <button onclick="completeChallenge('spiritual')" id="btn-spiritual">
              Concluir
            </button>
          </section>
          <section class="category-card">
            <h3>🧠 Emocional</h3>
            <div id="desc-emotional" class="challenge-text"></div>
            <button onclick="completeChallenge('mental')" id="btn-mental">
              Concluir
            </button>
          </section>
        </div>

        <button class="surprise-btn" onclick="surpriseChallenge()">
          🎲 Desafio Surpresa
        </button>

        <section class="weight-section card">
          <h3>Monitoramento Físico</h3>
          <div class="weight-input">
            <input
              type="number"
              id="weight-value"
              placeholder="Peso atual (kg)"
            />
            <button onclick="saveWeight()">Registrar</button>
          </div>
          <div id="weight-history"></div>
        </section>
        <section id="admin-panel"></section>
      </main>
    </div>
    <script src="assets/js/script.js"></script>
  </body>
</html>
